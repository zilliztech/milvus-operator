apiVersion: apps/v1
kind: Deployment
metadata:
  labels: {{- include "chart.labels" . | nindent 4 }}
  name: {{ include "chart.fullname" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  selector:
    matchLabels: {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations: {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels: {{- include "chart.selectorLabels" . | nindent 8 }}
    spec:
      affinity: {{- toYaml .Values.affinity | nindent 8 }}
      containers:
      - args:
        - -namespace
        - {{ .Release.Namespace | quote }}
        - -name
        - {{ include "chart.fullname" . | quote }}
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        - --leader-elect
        {{- if .Values.enableWebhook }}
        - --webhook=true
        {{- end }}
        command:
        - /manager
        image: '{{.Values.image.repository}}:{{.Values.image.tag|default .Chart.AppVersion}}'
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: {{ .Values.allowPrivilegeEscalation }}
        {{- if or .Values.enableWebhook .Values.volumeMounts }}
      volumeMounts:
      {{- if .Values.enableWebhook }}
      - mountPath: /tmp/k8s-webhook-server/serving-certs
        name: cert
        readOnly: true
      {{- end }}
      {{- if .Values.volumeMounts }}
      {{- range .Values.volumeMounts }}
      {{- if hasKey . "name" }}
      - name: {{ .name }}
        mountPath: {{ .mountPath }}
        {{- if .readOnly }}
        readOnly: {{ .readOnly }}
        {{- end }}
      {{- else }}
      {{- fail "Each item in volumeMounts must have a 'name' key" }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}
      imagePullSecrets: {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      nodeSelector: {{- toYaml .Values.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "chart.serviceAccountName" . | quote }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.tolerations | nindent 8 }}
      {{- if or .Values.enableWebhook .Values.volumes }}
      volumes:
      {{- if .Values.enableWebhook }}
      - name: cert
        secret:
          defaultMode: 420
          secretName: {{ include "chart.fullname" . }}-webhook-cert
      {{- end }}
      {{- if .Values.volumes }}
      {{- range .Values.volumes }}
      {{- if hasKey . "name" }}
      - name: {{ .name }}
        {{- if .secret }}
        secret:
          secretName: {{ .secret.secretName }}
        {{- else if .configMap }}
        configMap:
          name: {{ .configMap.name }}
        {{- else if .emptyDir }}
        emptyDir: {{- toYaml .emptyDir | nindent 4 }}
        {{- else if .persistentVolumeClaim }}
        persistentVolumeClaim:
          claimName: {{ .persistentVolumeClaim.claimName }}
        {{- else if .hostPath }}
        hostPath: {{- toYaml .hostPath | nindent 4 }}
        {{- else if .nfs }}
        nfs: {{- toYaml .nfs | nindent 4 }}
        {{- else }}
        {{- fail (printf "Unsupported or missing volume type for volume '%s'" .name) }}
        {{- end }}
      {{- else }}
      {{- fail "Each item in volumes must have a 'name' key" }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- end }}